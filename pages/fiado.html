<div class="page" id="page-fiado">
  <div class="page-title">Controle de Fiado</div>
  <div class="g4 mb16">
    <div class="metric"><div class="metric-label">Clientes</div><div class="metric-value" id="fi-clientes">—</div></div>
    <div class="metric"><div class="metric-label">Total em aberto</div><div class="metric-value" id="fi-total" style="color:var(--red)">—</div></div>
    <div class="metric"><div class="metric-label">Recebido hoje</div><div class="metric-value" id="fi-hoje" style="color:var(--green)">—</div></div>
    <div class="metric"><div class="metric-label">Clientes com saldo</div><div class="metric-value" id="fi-ativos">—</div></div>
  </div>
  <div class="g2 mb12">
    <div class="card">
      <div class="card-title">Novo cliente / Lançamento</div>
      <div class="field"><label>Nome do cliente</label><input type="text" id="fi-nome" placeholder="Ex: João Silva" list="fi-lista-nomes"><datalist id="fi-lista-nomes"></datalist></div>
      <div class="row">
        <div class="field"><label>Valor (R$)</label><input type="number" id="fi-val" placeholder="0,00" step="0.01"></div>
        <div class="field"><label>Tipo</label>
          <select id="fi-tipo"><option value="deb">Débito (comprou fiado)</option><option value="pag">Pagamento recebido</option></select>
        </div>
      </div>
      <div class="field"><label>Observação</label><input type="text" id="fi-obs" placeholder="Ex: Feijão 1kg, Arroz 2kg..."></div>
      <button class="btn btn-dark btn-full" onclick="addFiado()">Registrar</button>
    </div>
    <div class="card">
      <div class="card-title">Resumo por cliente</div>
      <input type="text" id="fi-busca" placeholder="Buscar cliente..." style="margin-bottom:13px" oninput="renderFiado()">
      <div style="max-height:320px;overflow-y:auto">
        <table><thead><tr><th>Cliente</th><th>Saldo devedor</th><th>Última mov.</th><th></th></tr></thead>
        <tbody id="tb-fiado"></tbody></table>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Histórico de lançamentos</div>
    <div style="max-height:300px;overflow-y:auto">
      <table><thead><tr><th>Data</th><th>Cliente</th><th>Tipo</th><th>Valor</th><th>Obs.</th><th></th></tr></thead>
      <tbody id="tb-fiado-hist"></tbody></table>
    </div>
  </div>
</div>

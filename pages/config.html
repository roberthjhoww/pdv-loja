<div class="page" id="page-config">
  <div class="page-title">Configurações</div>
  <div class="g2">
    <div class="card">
      <div class="card-title">Dados da loja</div>
      <div class="field"><label>Nome da loja</label><input type="text" id="cfg-nome" placeholder="Ex: Mercearia do João"></div>
      <div class="field"><label>Endereço</label><input type="text" id="cfg-end" placeholder="Opcional"></div>
      <div class="field"><label>Telefone</label><input type="text" id="cfg-tel" placeholder="Opcional"></div>
      <button class="btn btn-dark" onclick="salvarConfig()">Salvar configurações</button>
      <div class="sep"></div>
      <div class="card-title">Backup</div>
      <p style="font-size:14px;color:var(--text3);margin-bottom:13px">Exporta todos os dados em JSON para backup local.</p>
      <button class="btn btn-green" onclick="exportBackup()">Baixar backup JSON</button>
      <div class="sep"></div>
      <div class="card-title">Firebase</div>
      <p style="font-size:14px;color:var(--text3)">Projeto: <strong style="font-family:var(--mono)">point-da-bebida</strong></p>
      <button class="btn btn-sm btn-red" style="margin-top:10px" onclick="resetFirebase()">Desconectar Firebase</button>
    </div>
  </div>
</div>

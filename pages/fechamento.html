<div class="page" id="page-fechamento">
  <div class="page-title">Caixa do dia</div>

  <div id="caixa-status-bar" class="mb16"></div>

  <div class="g2 mb12">
    <!-- ABERTURA -->
    <div class="card" id="card-abertura">
      <div class="card-title">Abertura de caixa</div>
      <div id="abertura-form">
        <div class="field"><label>Data</label><input type="date" id="ab-data"></div>
        <div class="field"><label>Fundo de caixa (R$) — dinheiro inicial</label><input type="number" id="ab-fundo" placeholder="0,00" step="0.01" min="0"></div>
        <div class="field"><label>Observação</label><input type="text" id="ab-obs" placeholder="Opcional"></div>
        <button class="btn btn-dark btn-full" onclick="abrirCaixa()">Abrir caixa</button>
      </div>
      <div id="abertura-info" style="display:none">
        <div class="fech-line"><span class="fl-label">Data</span><span class="fl-val" id="ab-info-data">—</span></div>
        <div class="fech-line"><span class="fl-label">Fundo inicial</span><span class="fl-val" id="ab-info-fundo">—</span></div>
        <div class="fech-line"><span class="fl-label">Aberto às</span><span class="fl-val" id="ab-info-hora">—</span></div>
        <div class="fech-line"><span class="fl-label">Obs.</span><span class="fl-val" id="ab-info-obs">—</span></div>
        <button class="btn btn-sm btn-red" style="margin-top:10px" onclick="cancelarAbertura()">Cancelar abertura</button>
      </div>
    </div>

    <!-- SANGRIAS -->
    <div class="card">
      <div class="card-title">Sangrias do dia</div>
      <div class="row mb12">
        <div class="field"><label>Valor (R$)</label><input type="number" id="san-val" placeholder="0,00" step="0.01" min="0"></div>
        <div class="field"><label>Motivo</label><input type="text" id="san-mot" placeholder="Ex: Pagamento fornecedor"></div>
        <div style="display:flex;align-items:flex-end;padding-bottom:10px"><button class="btn btn-dark" onclick="addSangria()">Registrar</button></div>
      </div>
      <div id="lista-sangrias">
        <div class="empty">Nenhuma sangria hoje</div>
      </div>
      <div class="sep" style="margin:8px 0"></div>
      <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:500">
        <span style="color:var(--text2)">Total sangrias</span>
        <span style="font-family:var(--mono);color:var(--red)" id="total-sangrias">R$ 0,00</span>
      </div>
    </div>
  </div>

  <!-- FECHAMENTO -->
  <div class="card mb12">
    <div class="card-title">Fechamento de caixa</div>
    <div class="row" style="align-items:flex-end;gap:10px;flex-wrap:wrap">
      <div class="field" style="max-width:240px"><label>Dinheiro contado em caixa (R$)</label><input type="number" id="fech-dinheiro-contado" placeholder="0,00" step="0.01" min="0" oninput="calcDiferenca()"></div>
      <button class="btn btn-dark" onclick="gerarFechamento()">Fechar caixa</button>
      <button class="btn" onclick="imprimirFechamento()">Imprimir / PDF</button>
    </div>
  </div>

  <div id="fech-resultado"></div>
</div>

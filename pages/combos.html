<div class="page" id="page-combos">
  <div class="page-title">Combos</div>
  <div class="card mb12">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px">
      <div class="card-title" style="margin:0">Combos cadastrados</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge badge-gray" id="combo-count">0</span>
        <button class="btn btn-dark btn-sm" onclick="abrirModalNovoCombo()">+ Novo combo</button>
      </div>
    </div>
    <input type="text" id="cb-busca" placeholder="Buscar combo..." style="margin-bottom:10px" oninput="renderCombos()">
    <div style="overflow-y:auto">
      <table><thead><tr><th>Combo</th><th>Componentes</th><th>Custo</th><th>Venda</th><th>Margem</th><th></th></tr></thead>
      <tbody id="tb-combos"></tbody></table>
    </div>
  </div>
</div>
